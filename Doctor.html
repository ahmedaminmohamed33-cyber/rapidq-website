<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RapidQ</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background-color: #E4F1FA;
}

.navbar {
  padding: 20px 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.home-btn {
  background-color: #1E88E5;
  color: white;
  padding: 10px 22px;
  border: none;
  border-radius: 12px;
  font-weight: 600;
  font-size: 16px;
  cursor: pointer;
}

.home-btn:hover {
  background-color: #1565C0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 120px;
  margin-bottom: 40px;
}

.filters {
  margin: 30px auto;
  width: 80%;
  display: flex;
  gap: 15px;
  background: #F5F5F5;
  padding: 15px;
  border-radius: 12px;
}

.filters input,
.filters select {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  flex: 1;
  font-size: 14px;
}

.cards {
  width: 80%;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 25px;
  padding-bottom: 40px;
}

.card {
  background: #F5F5F5;
  border-radius: 16px;
  padding: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.card img {
  width: 140px;
}

.card-info h3 {
  color: #0A2540;
  font-weight: 600;
  margin-bottom: 5px;
}

.specialty {
  color: #1E88E5;
  font-size: 14px;
  margin-bottom: 5px;
}

.rating {
  margin-bottom: 5px;
}

.price {
  font-weight: 600;
  font-size: 18px;
  margin-bottom: 10px;
}

button {
  background: #1E88E5;
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
}

button:hover {
  background: #1565C0;
}

.no-results {
  grid-column: 1 / -1;
  text-align: center;
  color: #888;
  font-size: 16px;
  padding: 40px;
}
</style>

</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">
      <a href="Home.html">
        <img src="images/logo.svg" alt="RapidQ">
      </a>
    </div>
    <a href="Home.html">
      <button class="home-btn">Home</button>
    </a>
  </header>

  <!-- Filters -->
  <section class="filters">
    <input id="searchInput" type="text" placeholder="search by name or specialty...">
    <select id="specialityFilter">
      <option value="all">All Specialties</option>
      <option value="Cardiology">Cardiology</option>
      <option value="Neurology">Neurology</option>
      <option value="Dentistry">Dentistry</option>
    </select>
    <select id="ratingSort">
      <option value="none">Sort by Rating</option>
      <option value="asc">Low to High</option>
      <option value="desc">High to Low</option>
    </select>
    <select id="priceSort">
      <option value="none">Sort by Price</option>
      <option value="asc">Low to High</option>
      <option value="desc">High to Low</option>
    </select>
  </section>

  <!-- Doctors Cards will be injected here by JS -->
  <section class="cards" id="cardsContainer"></section>


  <script>
    // =========================================
    // STEP 1: Doctor Class (Blueprint for each doctor)
    // =========================================
    class Doctor {
      constructor(name, specialty, rating, price, image, profilePage) {
        this.name = name;
        this.specialty = specialty;
        this.rating = rating;
        this.price = price;
        this.image = image;
        this.profilePage = profilePage;
      }

      // This method builds the HTML card for this doctor
      renderCard() {
        return `
          <div class="card">
            <div class="card-info">
              <h3>${this.name}</h3>
              <p class="specialty">${this.specialty}</p>
              <p class="rating">⭐ ${this.rating}</p>
              <p class="price">${this.price} EGP</p>
              <a href="Booking.html">
                <button>Book Now</button>
              </a>
            </div>
            <a href="${this.profilePage}"><img src="${this.image}" alt="${this.name}" style="cursor:pointer;"></a>
          </div>
        `;
      }
    }


    // =========================================
    // STEP 2: DoctorList Class (Manages all doctors)
    // =========================================
    class DoctorList {
      constructor(doctors) {
        this.doctors = doctors;
      }

      getFiltered(searchText, specialty, ratingSort, priceSort) {
        let result = [...this.doctors];

        if (searchText !== "") {
          result = result.filter(doc =>
            doc.name.toLowerCase().includes(searchText) ||
            doc.specialty.toLowerCase().includes(searchText)
          );
        }

        if (specialty !== "all") {
          result = result.filter(doc => doc.specialty === specialty);
        }

        if (ratingSort === "asc") {
          result.sort((a, b) => a.rating - b.rating);
        } else if (ratingSort === "desc") {
          result.sort((a, b) => b.rating - a.rating);
        }

        if (priceSort === "asc") {
          result.sort((a, b) => a.price - b.price);
        } else if (priceSort === "desc") {
          result.sort((a, b) => b.price - a.price);
        }

        return result;
      }
    }


    // =========================================
    // STEP 3: Your Doctor Data
    // =========================================
    const allDoctors = new DoctorList([
      new Doctor("Dr. Ahmed Ali",      "Cardiology", 4.8, 300, "images/portrait-professional-medical-worker-posing-picture-with-arms-folded.png", "AhmedAli-Profile.html"),
      new Doctor("Dr. Omar Hassan",    "Neurology",  5.0, 600, "images/portrait-professional-medical-worker-posing-picture-with-arms-folded.png", "Omar-Profile.html"),
      new Doctor("Dr. Mohamed Salama", "Dentistry",  4.9, 500, "images/portrait-professional-medical-worker-posing-picture-with-arms-folded.png", "Mohamed-Profile.html"),
      new Doctor("Dr. Ahmed El-Haggar","Cardiology", 4.7, 500, "images/portrait-professional-medical-worker-posing-picture-with-arms-folded.png", "AhmedElhaggar-Profile.html"),
    ]);


    // =========================================
    // STEP 4: Display Function
    // =========================================
    function displayDoctors(doctors) {
      const container = document.getElementById("cardsContainer");

      if (doctors.length === 0) {
        container.innerHTML = `<p class="no-results">No doctors found.</p>`;
        return;
      }

      container.innerHTML = doctors.map(doc => doc.renderCard()).join("");
    }


    // =========================================
    // STEP 5: applyFilters
    // =========================================
    function applyFilters() {
      const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
      const specialty  = document.getElementById("specialityFilter").value;
      const ratingSort = document.getElementById("ratingSort").value;
      const priceSort  = document.getElementById("priceSort").value;

      const filtered = allDoctors.getFiltered(searchText, specialty, ratingSort, priceSort);
      displayDoctors(filtered);
    }


    // =========================================
    // STEP 6: Event Listeners
    // =========================================
    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("specialityFilter").addEventListener("change", applyFilters);
    document.getElementById("ratingSort").addEventListener("change", applyFilters);
    document.getElementById("priceSort").addEventListener("change", applyFilters);


    // =========================================
    // STEP 7: Initial Load
    // =========================================
    displayDoctors(allDoctors.doctors);
  </script>

</body>
</html>
