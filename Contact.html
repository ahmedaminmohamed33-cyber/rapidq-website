<!DOCTYPE html>

<html>
    <title>RapidQ - Contact</title>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<title>Contact</title>
                    <style>
                        * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                        font-family: 'Poppins', sans-serif;
                    }

                    body {
                            background-color: #E4F1FA;
                            display: flex;
                            flex-direction: column;
                            align-items: center;
                            justify-content: center;
                            min-height: 100vh;
                            padding: 20px;


                    }

                    h2 {
                            font-size: 80px;
                            font-weight: 900;
                            color: #000000;
                            margin-bottom: 40px;
                    }

                    form {
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        width: 100%;
                        max-width: 600px;
                        gap: 0px;
                    }

                    input[type="text"],
                    input[type="email"] {
                        width: 100%;
                        padding: 18px 25px;
                        border: none;
                        border-radius: 50px;
                        background-color: #ffffff;
                        font-size: 15px;
                        color: #000000;
                        font-family: 'Poppins', sans-serif;
                        outline: none;
                    }

                    textarea {
                        width: 100%;
                        padding: 18px 25px;
                        border: none;
                        border-radius: 20px;
                        background-color: #ffffff;
                        font-size: 15px;
                        color: #000000;
                        font-family: 'Poppins', sans-serif;
                        outline: none;
                        height: 150px;
                        resize: none;
                    }

                    input::placeholder,
                    textarea::placeholder {
                        color: #B6BCC1;
                    }

                    button {
                        background-color: #0573E4;
                        color: white;
                        border: none;
                        padding: 15px 60px;
                        border-radius: 50px;
                        cursor: pointer;
                        font-family: 'Poppins', sans-serif;
                        font-weight: 700;
                        font-size: 16px;
                    }

                    button:hover {
                        background-color: #004D93;
                    }
                    @media (max-width: 768px) {
    body {
        padding: 60px 20px;
    }

    h2 {
        font-size: 45px;
        margin-bottom: 25px;
    }

    form {
        max-width: 100%;
    }

    input[type="text"],
    input[type="email"] {
        padding: 14px 20px;
        font-size: 14px;
    }

    textarea {
        padding: 14px 20px;
        font-size: 14px;
    }

    button {
        padding: 12px 40px;
        font-size: 14px;
    }
}
                    </style>
</head>

<body>

<h2>Contact Us</h2>

<form>
<input type="text" placeholder=" Enter Your Name"><br><br>
<input type="email" placeholder=" Enter Your Email" required><br><br>
<textarea placeholder="Message"></textarea><br><br>
<button>Send</button>
</form>

</body>
</html>
