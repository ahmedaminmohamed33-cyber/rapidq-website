<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Verification</title>

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #E4F1FA;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 350px;
    }

    .logo {
      width: 160px;
      margin-bottom: 40px;
    }

    h2 {
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }

    .otp-inputs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .otp-inputs input {
      width: 50px;
      height: 55px;
      border-radius: 15px;
      border: none;
      text-align: center;
      font-size: 20px;
      background-color: #F5F5F5;
    }

    .btn {
      width: 100%;
      height: 55px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(90deg, #1D73D6, #0E5ECF);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .resend {
      font-size: 14px;
      color: #1D73D6;
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>

<body>

  <div class="container">
        <a href="Home.html">
    <img src="images/logo.svg" class="logo" />
        </a>
    <h2>Email Verification</h2>
    <p>Enter the code sent to your email</p>

    <div class="otp-inputs">
      <input type="text" maxlength="1" required>
      <input type="text" maxlength="1" required>
      <input type="text" maxlength="1" required>
      <input type="text" maxlength="1" required>
    </div>
    
    <button class="btn" onclick="verifyCode()">Verify</button>

    <button class="resend">Resend Code</button>
  
  </div>

  <script>
    const inputs = document.querySelectorAll(".otp-inputs input");

    inputs.forEach((input, index) => {
      input.addEventListener("input", (e) => {
        if (e.target.value.length === 1 && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });
    });

    function verifyCode() {
      let code = "";
      inputs.forEach(input => code += input.value);

      if (code.length === 4) {
        // هنا تروحي لصفحة تغيير الباسورد
        window.location.href = "forgot.html";
      } else {
        alert("Please enter complete code");
      }
    }
  </script>

</body>
</html>
