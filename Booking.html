<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>
</head>

<body>
<h2>RapidQ</h2>

<h2>Book an Appointment</h2>

<form>
        <label>First Name</label><br>
    <input type="text" placeholder="Enter Your First Name" required><br><br>

    <label>Last Name</label><br>
<input type="text" placeholder=" Enter Your Last Name" required><br><br>

    <label>Email</label><br>
<input type="email" placeholder=" Enter Your Email" required><br><br>

    <label>Phone Number</label><br>
<input type="text" placeholder=" Enter Your Phone Number" required><br><br>

<label>Date</label><br>
<input type="date" required><br><br>

<label>Time</label><br>
<input type="time" required><br><br>

<button>Submit</button>
</form>

</body>
</html>
