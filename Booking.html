<!DOCTYPE html>
<html>
<head>
<title>Book Appointment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800&display=swap" rel="stylesheet">
<style> 
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body.page {
    font-family: 'Poppins', sans-serif;
    background: #E4F1FA;
}

/* Layout */
.container {
    display: flex;
    height: 100vh;
    padding: 40px 60px;
}

/* LEFT SIDE */
.left {
    flex: 1;
    position: relative;
}

.logo {
    width: 120px;
    margin-bottom: 40px;
}

.doctor {
    width: 450px;
    position: absolute;
    bottom: 0;
    left: 0;
}

/* RIGHT SIDE */
.right {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* Titles */
.brand {
    font-weight: 600;
    margin-bottom: 20px;
}

.sub {
    color: #2F80ED;
    letter-spacing: 2px;
    font-size: 18px;
    margin-bottom: 10px;
}

.title {
    font-size: 64px;
    font-weight: 700;
    margin-bottom: 30px;
}
.home-btn {
    position: absolute;
    top: 40px;
    right: 60px;
    background: white;
    color: #2F80ED;
    padding: 10px 22px;
    border-radius: 25px;
    font-weight: 500;
    text-decoration: none;
    transition: 0.3s;
}

.home-btn:hover {
    background: #2F80ED;
    color: white;
}
/* FORM */
.form {
    max-width: 500px;
}

.row {
    display: flex;
    gap: 20px;
}

.field {
    display: flex;
    flex-direction: column;
    margin-bottom: 20px;
    flex: 1;
}

label {
    font-size: 14px;
    margin-bottom: 6px;
    color: #1A1A1A;
}

input {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #F3F6F9;
    font-size: 14px;
    outline: none;
}

/* Button */
.btn {
    margin-top: 20px;
    padding: 14px;
    width: 180px;
    border: none;
    border-radius: 25px;
    background: #2F80ED;
    color: white;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #1366d6;
}
</style> 
</head>

<body class="page">

<div class="container">
<a href="Home.html" class="home-btn">Home</a>
    <div class="left">
        <img src="images/logo.svg" class="logo">
        <img src="images/portrait-professional-medical-worker-posing-picture-with-arms-folded.png" class="doctor">
    </div>

    <div class="right">

        <p class="sub">BOOK AN</p>
        <h1 class="title">Appointment</h1>

        <form class="form">
            <div class="row">
                <div class="field">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="Enter your First Name" required>
                </div>

                <div class="field">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Enter your Last Name" required>
                </div>
            </div>

            <div class="field">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="Enter your phone number" required>
            </div>

            <div class="field">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="row">
                <div class="field">
                    <label>Preferred Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="field">
                    <label>Preferred Time</label>
                    <input type="time" id="time" required>
                </div>
            </div>

            <button class="btn" id="submitBtn">Submit →</button>
        </form>
    </div>

</div>

<script>
  class BookingForm {
    constructor() {
      this.firstName = document.getElementById("firstName");
      this.lastName  = document.getElementById("lastName");
      this.phone     = document.getElementById("phone");
      this.email     = document.getElementById("email");
      this.date      = document.getElementById("date");
      this.time      = document.getElementById("time");
      this.submitBtn = document.getElementById("submitBtn");
    }

    getData() {
      return {
        firstName: this.firstName.value,
        lastName:  this.lastName.value,
        phone:     this.phone.value,
        email:     this.email.value,
        date:      this.date.value,
        time:      this.time.value,
      };
    }

    listen() {
      this.submitBtn.addEventListener("click", (e) => {
        e.preventDefault();
        const data = this.getData();
        localStorage.setItem("bookingDate", data.date);
        localStorage.setItem("bookingTime", data.time);
        window.location.href = "Payment-Method.html";
      });
    }
  }

  const form = new BookingForm();
  form.listen();
</script>

</body>
</html>
